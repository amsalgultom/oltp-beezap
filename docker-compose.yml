services:
  # --------------------------------------------------------------------------
  # Kafka Connect + Debezium (PostgreSQL CDC source)
  # Connects out to Server A (Postgres) and Server B (Kafka) over the network.
  # --------------------------------------------------------------------------
  kafka-connect:
    image: debezium/connect:2.7
    container_name: beezap-kafka-connect
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      GROUP_ID: ${CONNECT_GROUP_ID:-beezap-connect-cluster}
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    volumes:
      # Lets `docker compose exec kafka-connect bash /kafka/create-topics.sh`
      # use the bundled kafka-topics.sh (already on PATH at /kafka/bin) against
      # Server B.
      - ./kafka/create-topics.sh:/kafka/create-topics.sh:ro

  # --------------------------------------------------------------------------
  # ClickHouse — analytics store, consumes the cdc.* topics from Server B
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: beezap-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123" # HTTP interface (Superset driver, curl, apply.sh)
      - "9000:9000" # native protocol (clickhouse-client)
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-beezap}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  # --------------------------------------------------------------------------
  # Superset metadata DB (separate from the Beezap OLTP Postgres on Server A)
  # --------------------------------------------------------------------------
  superset-db:
    image: postgres:16
    container_name: beezap-superset-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SUPERSET_DB_NAME:-superset}
      POSTGRES_USER: ${SUPERSET_DB_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD}
    volumes:
      - superset-db-data:/var/lib/postgresql/data

  # --------------------------------------------------------------------------
  # Superset — dashboards on top of ClickHouse
  # --------------------------------------------------------------------------
  superset:
    build: ./superset
    container_name: beezap-superset
    restart: unless-stopped
    depends_on:
      - superset-db
      - clickhouse
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DB_HOST: superset-db
      SUPERSET_DB_PORT: "5432"
      SUPERSET_DB_USER: ${SUPERSET_DB_USER:-superset}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD}
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME:-superset}
      REDIS_URL: ${REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - superset-home:/app/superset_home

volumes:
  clickhouse-data:
  superset-db-data:
  superset-home:
